<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroSim Tehran</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚇 MetroSim Tehran</h1>
    <p>شبیه‌ساز موقعیت‌یابی مترو تهران بدون GPS</p>
</header>

<main class="container">

    <section class="card">

        <label>ایستگاه مبدا</label>
        <select id="origin"></select>

        <label>ایستگاه مقصد</label>
        <select id="destination"></select>

        <label>ساعت سوار شدن</label>
        <input type="time" id="boardingTime">

        <button id="startBtn">
            محاسبه موقعیت
        </button>

    </section>

    <section class="card">

        <h2>زمان فعلی</h2>

        <div class="info-row">
            <span>منبع زمان</span>
            <strong id="timeSource">
                در حال دریافت...
            </strong>
        </div>

        <div class="info-row">
            <span>ساعت فعلی</span>
            <strong id="currentTime">
                --:--:--
            </strong>
        </div>

    </section>

    <section class="card">

        <h2>وضعیت سفر</h2>

        <div class="info-row">
            <span>ایستگاه فعلی</span>
            <strong id="currentStation">-</strong>
        </div>

        <div class="info-row">
            <span>ایستگاه بعدی</span>
            <strong id="nextStation">-</strong>
        </div>

        <div class="info-row">
            <span>زمان باقی‌مانده</span>
            <strong id="remainingTime">-</strong>
        </div>

        <div class="info-row">
            <span>ایستگاه‌های باقی‌مانده</span>
            <strong id="remainingStations">-</strong>
        </div>

        <div class="info-row">
            <span>پیشرفت مسیر</span>
            <strong id="progressPercent">0%</strong>
        </div>

        <div class="progress-container">
            <div id="progressBar"></div>
        </div>

    </section>

    <section class="card">

        <h2>موقعیت تقریبی</h2>

        <div id="betweenStations">
            هنوز سفری محاسبه نشده است
        </div>

    </section>

    <section class="card">

        <h2>نمایش مسیر</h2>

        <div id="metroMap">

            <div id="metroLine">

                <div id="trainMarker"></div>

            </div>

        </div>

    </section>

</main>

<script src="app.js"></script>

</body>

</html>
